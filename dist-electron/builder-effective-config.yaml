directories:
  output: dist-electron
  buildResources: assets
$schema: https://raw.githubusercontent.com/electron-userland/electron-builder/master/schemas/config.schema.json
appId: com.mamostore.app
productName: متجر مامو
copyright: Copyright © 2026 Mamo Store
files:
  - filter:
      - dist/**/*
      - electron/**/*
      - package.json
win:
  target: nsis
nsis:
  oneClick: false
  allowToChangeInstallationDirectory: true
  createDesktopShortcut: true
  createStartMenuShortcut: true
  shortcutName: MamoStore
  installerIcon: assets/icon.ico
  uninstallerIcon: assets/icon.ico
  installerHeaderIcon: assets/icon.ico
electronVersion: 31.7.7
